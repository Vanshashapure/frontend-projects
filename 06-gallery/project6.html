<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery with Lightbox </title>
    <link rel="stylesheet" href="project6.css">
</head>
<body>
    <section class="gallery">
         <div class="gallery-item" onclick="openLightbox('img1.jpg')">
    <img src="img1.jpg" alt="Photo 1" />
  </div>
  <div class="gallery-item" onclick="openLightbox('img2.jpg')">
    <img src="img2.jpg" alt="Photo 2" />
  </div>
  
  
  <div class="gallery-item" onclick="openLightbox('img3.jpg')">
    <img src="img3.jpg" alt="photo 3" />
  </div>
  <div class="gallery-item" onclick="openLightbox('img4.jpg')">
    <img src="img4.jpg" alt="Photo 4" />
  </div>
  <div class="gallery-item" onclick="openLightbox('img5.jpg')">
    <img src="img5.jpg" alt="Photo 5" />
  </div>
  <div class="gallery-item" onclick="openLightbox('img6.jpg')">
    <img src="img6.jpg" alt="photo 6" />
  </div>
  
  
    </section>

    <div class="lightbox" id="lightbox">
  <span class="close-btn" id="close-btn">✕</span>
  <img class="lightbox-img" id="lightbox-img" src="" alt="Full view" />
</div>

    <script  src="project6.js"></script>
</body>
</html>
